            <h2>制作スタイル</h2>
            <p>Blenderを活用してモデリング、マテリアル設定、ライティング、レンダリングまで一貫して制作し、世界観を意識した表現に取り組んでいます。</p>
            <p>作品ごとにテーマや配色を決め、視線誘導や情報量のバランスを意識してクオリティを高めています。</p>
            <p>今後はアニメーションやVFXも取り入れ、より没入感のある映像制作へ発展させる予定です。</p>
        </section>
